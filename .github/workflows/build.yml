name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model (bundled into the .app)
        run: python -m spacy download en_core_web_md

      - name: Build with PyInstaller
        run: pyinstaller --clean autodact_macos.spec

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - dist/Autodact.app

      - name: Create DMG
        run: |
          hdiutil create \
            -volname Autodact \
            -srcfolder dist/Autodact.app \
            -ov -format UDZO \
            dist/Autodact-macOS.dmg

      - name: Upload artifact (every run)
        uses: actions/upload-artifact@v7
        with:
          name: Autodact-macOS
          path: dist/Autodact-macOS.dmg
          retention-days: 14

      - name: Upload release asset (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/Autodact-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model (bundled into the .exe)
        run: python -m spacy download en_core_web_md

      - name: Build with PyInstaller
        run: pyinstaller --clean autodact_windows.spec

      - name: Create zip
        run: Compress-Archive -Path dist\Autodact -DestinationPath dist\Autodact-Windows.zip

      - name: Upload artifact (every run)
        uses: actions/upload-artifact@v7
        with:
          name: Autodact-Windows
          path: dist/Autodact-Windows.zip
          retention-days: 14

      - name: Upload release asset (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/Autodact-Windows.zip
